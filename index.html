<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Trust Issues</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#09090B;
    color:white;
    overflow:hidden;
    min-height:100vh;
}

.bg{
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(180px);
    opacity:.25;
    animation:float 8s infinite alternate ease-in-out;
}

.bg1{
    background:#8B5CF6;
    top:-150px;
    left:-100px;
}

.bg2{
    background:#EF4444;
    bottom:-150px;
    right:-100px;
}

@keyframes float{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(-40px);
    }
}

.container{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:#18181B;
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:30px;
    box-shadow:0 0 50px rgba(0,0,0,.4);
    backdrop-filter:blur(20px);
}

.title{
    font-size:3rem;
    font-weight:900;
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.6;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    background:#27272A;
    color:white;
    border-radius:16px;
    margin-bottom:15px;
    font-size:1rem;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.03);
}

.primary{
    background:#8B5CF6;
    color:white;
}

.secondary{
    background:#27272A;
    color:white;
    margin-top:10px;
}

.hidden{
    display:none;
}

.roomCode{
    margin-top:20px;
    text-align:center;
    font-size:1.2rem;
    opacity:.8;
}

.players{
    margin-top:20px;
}

.player{
    background:#27272A;
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
}

.roleCard{
    margin-top:25px;
    background:#27272A;
    border-radius:25px;
    padding:30px;
    text-align:center;
    animation:pop .4s ease;
}

@keyframes pop{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.roleTitle{
    opacity:.6;
    margin-bottom:10px;
}

.roleWord{
    font-size:2.5rem;
    font-weight:900;
}

.impostor{
    color:#EF4444;
}

.voteArea{
    margin-top:20px;
}

.voteBtn{
    background:#EF4444;
    margin-top:10px;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:1.2rem;
}

.linkBox{
    margin-top:15px;
    background:#27272A;
    padding:12px;
    border-radius:12px;
    word-break:break-all;
    font-size:.9rem;
    opacity:.8;
}

</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="container">

<div class="card">

<div class="title">TRUST ISSUES</div>
<div class="subtitle">Find the impostor.</div>

<div id="home">

<input id="username" placeholder="Username">

<button class="primary" onclick="createLobby()">
CREATE LOBBY
</button>

<button class="secondary" onclick="joinLobby()">
JOIN LOBBY
</button>

</div>

<div id="lobby" class="hidden">

<div class="roomCode" id="roomCode"></div>

<div class="linkBox" id="inviteLink"></div>

<div class="players" id="players"></div>

<button class="primary" onclick="startGame()">
START GAME
</button>

<div id="roleCard" class="roleCard hidden">

<div class="roleTitle">YOUR ROLE</div>

<div class="roleWord" id="roleWord"></div>

</div>

<div class="voteArea hidden" id="voteArea">

<button class="voteBtn" onclick="votePlayer()">
VOTE SOMEONE 💀
</button>

</div>

<div class="result" id="result"></div>

</div>

</div>

</div>

<script>

let roomCode = ""
let username = ""
let players = []
let impostor = ""

const words = [
    "Pizza",
    "Tiger",
    "Laptop",
    "Coffee",
    "Beach",
    "Spider",
    "Burger",
    "Phone"
]

function randomCode(){
    return Math.random().toString(36).substring(2,7).toUpperCase()
}

function createLobby(){

    username = document.getElementById("username").value.trim()

    if(!username){
        alert("Enter username 😭")
        return
    }

    roomCode = randomCode()

    localStorage.setItem("room-"+roomCode, JSON.stringify({
        players:[username]
    }))

    const url = window.location.origin + window.location.pathname + "?room=" + roomCode

    history.pushState({}, "", "?room="+roomCode)

    openLobby(url)
}

function joinLobby(){

    username = document.getElementById("username").value.trim()

    if(!username){
        alert("Enter username 😭")
        return
    }

    const params = new URLSearchParams(window.location.search)

    const room = params.get("room")

    if(!room){
        alert("No room link found 💀")
        return
    }

    roomCode = room

    let data = JSON.parse(localStorage.getItem("room-"+roomCode))

    if(!data){
        alert("Room not found")
        return
    }

    data.players.push(username)

    localStorage.setItem("room-"+roomCode, JSON.stringify(data))

    openLobby(window.location.href)
}

function openLobby(url){

    document.getElementById("home").classList.add("hidden")
    document.getElementById("lobby").classList.remove("hidden")

    document.getElementById("roomCode").innerHTML =
        "ROOM: <b>"+roomCode+"</b>"

    document.getElementById("inviteLink").innerText = url

    updatePlayers()
}

function updatePlayers(){

    let data = JSON.parse(localStorage.getItem("room-"+roomCode))

    if(!data) return

    players = data.players

    const container = document.getElementById("players")

    container.innerHTML = ""

    players.forEach(player=>{

        container.innerHTML += `
            <div class="player">${player}</div>
        `

    })

}

function startGame(){

    impostor = players[Math.floor(Math.random()*players.length)]

    const word = words[Math.floor(Math.random()*words.length)]

    document.getElementById("roleCard").classList.remove("hidden")
    document.getElementById("voteArea").classList.remove("hidden")

    const roleWord = document.getElementById("roleWord")

    if(username === impostor){

        roleWord.innerHTML = `
            <span class="impostor">
            YOU ARE THE IMPOSTOR 💀
            </span>
        `

    }else{

        roleWord.innerText = word

    }

    navigator.vibrate?.(200)

}

function votePlayer(){

    const others = players.filter(p=>p!==username)

    if(others.length===0){
        alert("No players 😭")
        return
    }

    const voted = others[Math.floor(Math.random()*others.length)]

    document.getElementById("result").innerHTML = `
        You voted <b>${voted}</b><br><br>
        Impostor was <b>${impostor}</b>
    `
}

window.onload = ()=>{

    const params = new URLSearchParams(window.location.search)

    const room = params.get("room")

    if(room){

        document.querySelector(".secondary").innerText =
        "JOIN THIS LOBBY"

    }

}

setInterval(updatePlayers,1000)

</script>

</body>
</html>
